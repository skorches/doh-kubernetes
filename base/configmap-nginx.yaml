apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: doh-system
  labels:
    app.kubernetes.io/name: doh-nginx
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: doh-smart-dns
data:
  doh.conf: |
    # Upstream: DoH backend server
    upstream doh_backend {
        server doh-backend:8053;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server — DoH endpoint
    server {
        listen 443 ssl;
        server_name _;

        # TLS certificates (mounted from Secret)
        ssl_certificate     /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # DoH endpoint
        location /dns-query {
            proxy_pass http://doh_backend/dns-query;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for DoH
            proxy_set_header Accept application/dns-message;
            proxy_set_header Content-Type application/dns-message;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 5s;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
